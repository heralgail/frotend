<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Nexus Stream - Product Inventory Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* --- Root and Global Styles - NEON TECH THEME --- */
        :root {
            --primary-color: #00ffff; /* Neon Cyan/Blue */
            --secondary-color: #ff00ff; /* Neon Magenta Accent */
            --text-color: #f0f0f0;
            --light-text: #B0B0B0;
            --dark-bg: #0d0d0d; 
            --header-bg: #1a1a1a;
            --card-bg: #222;
            --danger-bg: #800080;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
        }

        /* --- Navbar Styles --- */
        .navbar-custom { background-color: var(--header-bg); border-bottom: 2px solid var(--secondary-color); }
        .navbar-brand { color: var(--primary-color) !important; font-weight: 700; text-shadow: 0 0 3px var(--primary-color); }
        .nav-link.active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }
        .nav-link { color: var(--light-text) !important; }
        .nav-link:hover { color: var(--primary-color) !important; }

        /* --- Content Styles --- */
        .container-fluid { padding-top: 30px; }
        h3 { color: var(--primary-color); font-weight: 600; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Table Styles */
        .table { color: var(--text-color); background-color: #1a1a1a; border: 1px solid #333; }
        .table-custom th { background-color: var(--secondary-color); color: var(--dark-bg); border-color: var(--secondary-color); }
        .table-striped > tbody > tr:nth-of-type(odd) > * { background-color: #222 !important; }
        .table-hover > tbody > tr:hover > * { background-color: #333 !important; }

        /* Button/Modal Styles */
        .btn-custom-add { background-color: var(--primary-color); border-color: var(--primary-color); color: var(--dark-bg); font-weight: 600; }
        .btn-custom-danger { background-color: var(--danger-bg); border-color: var(--danger-bg); color: var(--text-color); }
        .btn-info { background-color: #2c3e50 !important; border-color: #2c3e50 !important; }
        .modal-content { background-color: var(--card-bg); border: 1px solid var(--primary-color); color: var(--text-color); }
        .modal-title { color: var(--primary-color); font-weight: 700; }
        .form-control, .form-select { background-color: #2b2b2b; border: 1px solid #444; color: var(--text-color); }
        .status-message { position: fixed; top: 20px; right: 20px; z-index: 1050; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow">
        <div class="container-fluid">
            <a class="navbar-brand" href="admin-dashboard.html"><i class="fas fa-terminal me-2"></i> Nexus Root Console</a>
            
            <div class="navbar-nav me-auto mb-2 mb-lg-0">
                <a class="nav-link active" aria-current="page" href="admin-products.html"><i class="fas fa-boxes"></i> Product Inventory</a>
                <a class="nav-link" href="admin-dashboard.html#users"><i class="fas fa-users-cog"></i> User Management</a>
            </div>
            
            <button class="btn btn-sm btn-outline-light" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
        </div>
    </nav>
    
    <div class="container-fluid">
        <h3>Product Inventory Log</h3>

        <div class="alert status-message d-none" role="alert" id="status-message"></div>

        <button class="btn btn-custom-add mb-3" data-bs-toggle="modal" data-bs-target="#productModal">
            <i class="fas fa-plus"></i> Add New Product
        </button>

        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-custom">
                    <tr>
                        <th>ID Fragment</th>
                        <th>Designation (Name)</th>
                        <th>Cost Unit (Price)</th>
                        <th>Stock Count</th>
                        <th>Action Protocol</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Configure Product Data</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="product-form">
                    <div class="modal-body">
                        <input type="hidden" id="productId">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (USD)</label>
                            <input type="number" class="form-control" id="price" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="stock" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="save-btn">Save Configuration</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // --- LOCAL STORAGE CONFIGURATION ---
        const STORAGE_KEY = 'adminProducts';
        
        // --- DOM Elements ---
        const tableBody = document.getElementById('product-table-body');
        const productForm = document.getElementById('product-form');
        const productModal = new bootstrap.Modal(document.getElementById('productModal'));
        const modalTitle = document.getElementById('modalTitle');
        const statusMessage = document.getElementById('status-message');

        // --- Utility Functions ---

        function showStatus(message, type = 'success') {
            statusMessage.textContent = message;
            statusMessage.className = `alert alert-${type} status-message`;
            statusMessage.classList.remove('d-none');
            setTimeout(() => {
                statusMessage.classList.add('d-none');
            }, 3000);
        }

        function checkAuth() {
            if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
                alert("ACCESS VIOLATION: Root credentials not found. Redirecting to login terminal.");
                window.location.href = 'admin-login.html';
            }
        }
        
        // Function to generate a simple unique ID (Local Storage doesn't do this automatically)
        function generateUniqueId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 9);
        }

        // --- Local Storage Functions ---

        // READ: Retrieves and parses the product array from Local Storage
        function getProductsFromLocal() {
            const productsString = localStorage.getItem(STORAGE_KEY);
            return productsString ? JSON.parse(productsString) : [];
        }

        // SAVE: Stringifies and saves the product array to Local Storage
        function saveProductsToLocal(productsArray) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(productsArray));
        }

        // --- Product CRUD Functions (Local Storage based) ---

        // READ - Fetch all products
        function fetchProducts() {
            const products = getProductsFromLocal();
            renderProducts(products);
        }

        // Display products in the table
        function renderProducts(products) {
            tableBody.innerHTML = '';
            if (products.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No products found in the inventory.</td></tr>';
                return;
            }

            products.forEach(product => {
                const row = tableBody.insertRow();
                const priceFormatted = product.price != null ? product.price.toFixed(2) : 'N/A';
                
                // Truncate ID for cleaner display
                const displayId = product._id ? product._id.substring(0, 8) + '...' : 'N/A';

                row.innerHTML = `
                    <td>${displayId}</td>
                    <td>${product.name}</td>
                    <td>$${priceFormatted}</td>
                    <td>${product.stock}</td>
                    <td>
                        <button class="btn btn-sm btn-info text-white" onclick="editProduct('${product._id}', '${product.name}', \`${product.description}\`, ${product.price}, ${product.stock})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-sm btn-custom-danger ms-2" onclick="deleteProduct('${product._id}', '${product.name}')">
                            <i class="fas fa-trash"></i> Purge
                        </button>
                    </td>
                `;
            });
        }

        // CREATE / UPDATE - Handle form submission
        productForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const productId = document.getElementById('productId').value;
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            const price = parseFloat(document.getElementById('price').value);
            const stock = parseInt(document.getElementById('stock').value);
            
            let products = getProductsFromLocal();
            let successMessage;

            if (productId) { // UPDATE
                const index = products.findIndex(p => p._id === productId);
                if (index !== -1) {
                    // Spread syntax to merge old data and new data
                    products[index] = { ...products[index], name, description, price, stock };
                    successMessage = `Product ${name} updated successfully in Local Storage!`;
                }
            } else { // CREATE
                const newProduct = {
                    _id: generateUniqueId(),
                    name, description, price, stock
                };
                products.push(newProduct);
                successMessage = `New product ${name} added to Local Storage!`;
            }

            saveProductsToLocal(products);
            showStatus(successMessage, 'success');
            productModal.hide();
            fetchProducts(); // Refresh the table
        });

        // Pre-fill modal for editing
        function editProduct(id, name, description, price, stock) {
            document.getElementById('productId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('description').value = description;
            document.getElementById('price').value = Math.max(0, price || 0); 
            document.getElementById('stock').value = stock;
            
            modalTitle.textContent = 'Edit Product Configuration';
            
            productModal.show();
        }

        // DELETE
        function deleteProduct(id, name) {
            if (!confirm(`WARNING: Initiate deletion protocol for product: ${name}? This action is irreversible.`)) {
                return;
            }

            let products = getProductsFromLocal();
            // Filter out the product with the matching ID
            const updatedProducts = products.filter(p => p._id !== id);
            
            saveProductsToLocal(updatedProducts);
            showStatus(`Product ${name} purged from Local Storage.`, 'success');
            fetchProducts(); // Refresh the table
        }

        // --- Data Initialization ---
        // Seed the Local Storage with initial data if it's empty
        function initializeProducts() {
            if (!localStorage.getItem(STORAGE_KEY)) {
                const initialData = [
                    { "_id": generateUniqueId(), "name": "Nexus Streamer V2", "description": "High-speed, low-latency streaming hub.", "price": 499.99, "stock": 45 },
                    { "_id": generateUniqueId(), "name": "CyberOS License (Annual)", "description": "Subscription for advanced network security.", "price": 99.00, "stock": 1000 },
                    { "_id": generateUniqueId(), "name": "Ethernet Cable (10m, Cat-Z)", "description": "Braided fiber cable optimized for data transfer.", "price": 19.50, "stock": 150 },
                ];
                saveProductsToLocal(initialData);
            }
        }
        
        // --- Event Handlers & Initialization ---
        
        // Logout functionality
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'admin-login.html';
        });

        // Reset form when modal is closed
        document.getElementById('productModal').addEventListener('hidden.bs.modal', function () {
            productForm.reset();
            document.getElementById('productId').value = '';
            modalTitle.textContent = 'Configure Product Data';
        });

        // Export functions to global scope (required for use in onclick attributes)
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;

        // Initial load
        checkAuth();
        initializeProducts(); // Ensure data exists
        fetchProducts(); // Load data into the table
    </script>
</body>
</html>
